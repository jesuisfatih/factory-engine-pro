packages:
  - "apps/*"
  - "services/*"
  - "packages/*"
  - "extensions/*"
overrides:
  '@types/react': 18.3.31
  '@types/react-dom': 18.3.7
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msgpackr-extract: true
  prisma: true
minimumReleaseAgeExclude:
  - '@tanstack/react-virtual@3.14.4'
  - '@tanstack/virtual-core@3.17.2'

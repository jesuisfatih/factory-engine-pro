services:
  redis:
    # Optional local-only queue dependency. Remote test/staging/prod use Vultr managed Redis via REDIS_URL.
    image: redis:7-alpine
    container_name: factory-engine-pro-redis
    ports:
      - "6389:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - factory_engine_pro_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  factory_engine_pro_redis:
